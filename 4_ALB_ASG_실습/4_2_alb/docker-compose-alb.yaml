services:
  # main 서비스 (Nginx)
  service-docker-main:
    # build:
    #   context: ./main
    #   dockerfile: Dockerfile
    image: csjin21c/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

  # docker-install (Nginx)
  service-docker-install:
    image: reoyuza/nginx:1.29.7-docker-install
    container_name: docker-install-nginx-container
    restart: always
    ports:
      - "8081:80"
    networks:
      - board-network

  # docker-build (Nginx)
  service-docker-build:
    image: reoyuza/nginx:1.29.7-docker-build
    container_name: docker-build-nginx-container
    restart: always
    ports:
      - "8082:80"
    networks:
      - board-network

  # docker-command (Nginx)
  service-docker-command:
    image: reoyuza/nginx:1.29.7-docker-command
    container_name: docker-command-nginx-container
    restart: always
    ports:
      - "8083:80"
    networks:
      - board-network

  # docker-compose (Nginx)
  service-docker-compose:
    image: reoyuza/nginx:1.29.7-docker-compose
    container_name: docker-compose-nginx-container
    restart: always
    ports:
      - "8084:80"
    networks:
      - board-network

  # docker-swarm (Nginx)
  service-docker-swarm:
    image: reoyuza/nginx:1.29.7-docker-swarm
    container_name: docker-swarm-nginx-container
    restart: always
    ports:
      - "8085:80"
    networks:
      - board-network


  # kubernetes (FastAPI - /kubernetes path 기반 직접 연결)
  service-kubernetes-fastapi:
    image: reoyuza/fastapi-kubernetes:latest
    container_name: kubernetes-fastapi-container
    restart: always
    ports:
      - "8087:8000"
    networks:
      - board-network

  # board MySQL
  service-board-mysql:
    image: reoyuza/mysql-board:latest
    container_name: mysql-primary-container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    networks:
      - board-network

  # board FastAPI (포트 노출 없음 - nginx 통해서만 접근)
  service-board-fastapi:
    image: reoyuza/fastapi-board:latest
    container_name: board-fastapi-container
    restart: always
    depends_on:
      - service-board-mysql
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    networks:
      - board-network

  # board Nginx (리버스 프록시 - ALB에서 8088로 받음)
  service-board-nginx:
    image: reoyuza/nginx-board:latest
    container_name: board-nginx-container
    restart: always
    depends_on:
      - service-board-fastapi
    ports:
      - "8088:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge