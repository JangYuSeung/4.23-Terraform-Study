    <header class="hero-section">
      <div class="container">
        <nav class="mb-4">

    <main class="container my-5">
      <div class="content-card text-white bg-secondary">
        <h2>Docker Swarm 클러스터링</h2>
        <p>
          여러 Docker 호스트를 하나의 가상 호스트로 관리하는 오케스트레이션
          도구입니다.
        </p>
      </div>
      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card p-3 shadow-sm">
            <h5>1. Init</h5>
            <code>docker swarm init</code>
            <p class="small">매니저 노드 시작</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-3 shadow-sm">
            <h5>2. Service</h5>
            <code>docker service create</code>
            <p class="small">서비스 배포</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-3 shadow-sm">
            <h5>3. Scale</h5>
            <code>docker service scale=3</code>
            <p class="small">복제본 확장</p>
          </div>
        </div>
      </div>
